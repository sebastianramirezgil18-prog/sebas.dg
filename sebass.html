<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Profesional - Sebas DG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #080808;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .instagram-profile-card {
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.95) 0%, rgba(10, 10, 10, 0.9) 100%);
            width: 380px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .profile-header {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at center, rgba(0, 170, 170, 0.1) 0%, transparent 70%);
        }

        /* ESTO PONE LA FOTO EN EL CÍRCULO */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            margin-bottom: 15px;
        }

        .profile-username {
            font-weight: 700;
            font-size: 1.5rem;
            color: #ffffff;
            margin: 0;
        }

        .profile-tagline {
            font-size: 0.9rem;
            color: #00ffff;
            margin-bottom: 15px;
        }

        /* CONTACTO ARRIBA A LA IZQUIERDA */
        .contact-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 20px;
            margin-top: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            color: #00ffff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .contact-icon {
            margin-right: 12px;
        }

        .follow-button {
            background-color: #00ffff;
            color: #080808;
            border: none;
            padding: 10px 0;
            border-radius: 8px;
            font-weight: bold;
            width: 90%;
            margin-top: 20px;
            cursor: pointer;
        }

        .profile-bio {
            padding: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(20, 20, 20, 0.5);
        }

        .profile-display-name {
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            border-left: 3px solid #00ffff;
            padding-left: 10px;
        }

        .bio-list {
            list-style: none;
            padding-left: 10px;
            margin-top: 15px;
        }

        .bio-list li {
            margin-bottom: 8px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="instagram-profile-card">
        <div class="profile-header">
            <img src="img/flyer.png.jpeg" alt="Sebas DG" class="profile-pic">
            
            <p class="profile-username">sebas.dg_</p>
            <p class="profile-tagline">Diseñador digital & Web</p>

            <div class="contact-section">
                <a href="https://wa.me/573112575916" class="contact-item" target="_blank">
                    <i class="fab fa-whatsapp contact-icon"></i> 311 257 5916
                </a>
                <a href="https://instagram.com/sebas.dg_" class="contact-item" target="_blank">
                    <i class="fab fa-instagram contact-icon"></i> @sebas.dg_
                </a>
            </div>

            <button class="follow-button">Seguir</button>
        </div>

        <div class="profile-bio">
            <span class="profile-display-name">Sebastián Ramírez Gil | Sebas DG</span>
            <p>🚀 Transformando ideas en impacto visual.</p>
            <ul class="bio-list">
                <li>🔹 Páginas Web</li>
                <li>🔹 Flyers & Banners</li>
                <li>🔹 Hojas de Presentación</li>
            </ul>
        </div>
    </div>

</body>
</html>
